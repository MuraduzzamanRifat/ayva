name: Setup Shopify Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    # Intentionally NOT triggering on templates/page.*.json changes — those
    # are content edits. To register a new page, add its {title, handle,
    # template_suffix} to PAGES in setup-shopify-pages.mjs (which IS watched
    # here), or run the workflow manually via workflow_dispatch.
    paths:
      - setup-shopify-pages.mjs
      - .github/workflows/setup-shopify-pages.yml

jobs:
  create-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Create the 5 Shopify pages (idempotent)
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: |
          if [ -z "$SHOPIFY_STORE" ] || [ -z "$SHOPIFY_TOKEN" ]; then
            echo "::error::Missing secrets. Set SHOPIFY_STORE and SHOPIFY_TOKEN in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          node setup-shopify-pages.mjs
